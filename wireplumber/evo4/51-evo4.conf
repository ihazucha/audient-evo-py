## Audient EVO4 — WirePlumber device rules
##
## - Disables idle suspension to prevent clicks/pops on resume
## - Disables upmix so stereo apps only send to CH1/CH2 (FL/FR),
##   keeping CH3/CH4 (RL/RR) clean for the loopback bus
## - Renames the ALSA nodes for clarity
##
## Install: ~/.config/wireplumber/wireplumber.conf.d/51-evo4.conf

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-Audient_EVO4-00.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        node.description = "EVO4 Main Output"
        channelmix.upmix = false
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.usb-Audient_EVO4-00.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        node.description = "EVO4 Capture"
      }
    }
  }
]
