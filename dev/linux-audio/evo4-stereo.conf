# Audient EVO4 Stereo Loopback Configuration
#
# The EVO4 exposes 4 channels (FL FR FC LFE) but only 2 are physical.
# These loopback modules present clean stereo nodes so apps see a
# normal 2-channel device instead of a surround 4.0 layout.
#
# Install: ~/.config/pipewire/pipewire.conf.d/evo4-stereo.conf

context.modules = [
    # Output: stereo sink that forwards to the 4ch ALSA node
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Stereo Output"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_stereo_output"
                node.description = "EVO4 Stereo Output"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 4
                audio.position = [ FL FR FL FR ]
                stream.dont-remix = true
                node.passive = true
            }
        }
    }
    # Input: stereo source from the 4ch ALSA node (channels 1-2 only)
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Stereo Microphone"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 4
                audio.position = [ FL FR RL RR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_stereo_mic"
                node.description = "EVO4 Stereo Microphone"
            }
        }
    }
]
