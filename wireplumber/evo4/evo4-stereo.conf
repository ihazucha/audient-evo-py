# Audient EVO4 PipeWire Channel Configuration
#
# The EVO4 exposes 4 USB channels on both playback and capture:
#   CH1/CH2 (FL/FR) — Main output / Mic input
#   CH3/CH4 (RL/RR) — Loopback output / Loopback capture
#
# The raw ALSA sink (4ch) is never used directly by apps. Instead,
# virtual stereo loopback sinks/sources split the 4 channels:
#   evo4_main_output     → CH1/CH2 (FL/FR) — default sink for apps/games
#   evo4_loopback_output → CH3/CH4 (RL/RR) — feeds MU60 loopback bus
# (channelmix.upmix=false in 51-evo4.conf keeps CH3/CH4 clean if
# anything does connect to the raw sink directly.)
#
# Install: ~/.config/pipewire/pipewire.conf.d/evo4-stereo.conf

context.modules = [
    # ── Main Stereo Output ───────────────────────────────────────
    # Stereo sink → ALSA playback CH1/CH2 (FL/FR)
    # Use this as the default sink so apps see a stereo device.
    # Avoids games treating the raw 4ch ALSA sink as surround sound.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Main Output"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_main_output"
                node.description = "EVO4 Main Output"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
    # ── Loopback Output ──────────────────────────────────────────
    # Stereo sink → ALSA playback CH3/CH4 (RL/RR)
    # Audio sent here feeds MU60 inputs 4-5 (LoopOut L/R, CN 8-11).
    # NOTE: Do NOT set node.passive on the playback side — it would
    # prevent this module from activating the ALSA sink, silencing
    # the loopback output entirely.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Loopback Output"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_loopback_output"
                node.description = "EVO4 Loopback Output"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
    # ── Microphone ───────────────────────────────────────────────
    # ALSA capture CH1/CH2 (FL/FR) → stereo source
    # Physical mic/line inputs after preamp (FU11 gain).
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Microphone"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_mic"
                node.description = "EVO4 Microphone"
            }
        }
    }
    # ── Loopback Capture ─────────────────────────────────────────
    # ALSA capture CH3/CH4 (RL/RR) → stereo source
    # Captures the MU60 mixer's loopback bus output.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO4 Loopback"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO4-00.analog-surround-40"
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo4_loopback_capture"
                node.description = "EVO4 Loopback"
            }
        }
    }
]
