## Audient EVO4 — WirePlumber device rules
##
## Disables idle suspension on EVO4 ALSA nodes to prevent clicks/pops
## when audio resumes after a pause. Replaces the dead WP 0.4 Lua config.
##
## Install: ~/.config/wireplumber/wireplumber.conf.d/51-evo4.conf

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_*.usb-Audient_EVO4-00.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
      }
    }
  }
]
